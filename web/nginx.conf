# elstadt.com — nginx config for the Angular SPA.
# SPA fallback: every non-asset path resolves to /index.html so
# client-side routes like /m/sebastian and /m/sebastian/resume
# work after a direct page load or refresh.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip — text assets benefit; binaries (jpg/woff2) already compressed.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Long-cache fingerprinted assets (Angular's outputHashing=all).
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|jpg|jpeg|png|gif|ico|svg|webp|avif|pdf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA shell — never cache, always pull a fresh index for routing.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # Client-side routes: fall back to the SPA shell.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Modest baseline security headers — adjust as the app needs.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
